# ===========================================================================
#  Live Kalki Exchange fleet config. Drives the REAL bet market via its
#  internal API. Point base_url at a local instance first, then production by
#  changing ONLY this file / env. URLs + secret come from env (never hardcoded).
#
#    export KALKI_URL=https://kalki.bet/markets
#    export INTERNAL_API_SECRET=...           # must match the bet server's .env
# ===========================================================================

exchange:
  # How the fleet authenticates to the exchange:
  #   public   — bots are REAL users via the regular register/login API; no
  #              INTERNAL_API_SECRET, no DB access. Accounts persist locally in
  #              runs/kalki_accounts.json (gitignored). This is how you drive
  #              production kalki.bet without server-side access.
  #   internal — Bearer INTERNAL_API_SECRET against /api/internal/*; bots are
  #              seeded in the DB (bet/bet scripts/seed-bots.ts).
  mode: public
  # NOTE: include the app's basePath (/markets). Prod: https://kalki.bet/markets
  base_url: "${KALKI_URL:-https://kalki.bet/markets}"
  fleet_size: 6                # public mode: how many bots to register + log in (throttle-bound)
  market_limit: 12             # markets to trade (public trending max 20). Each gets ONE shared
                               # LLM signal/refresh when Qwen drives actions, so this caps LLM cost.
  internal_secret: "${INTERNAL_API_SECRET:-CHANGE_ME_set_INTERNAL_API_SECRET}"  # internal mode only
  timeout_s: 20

fleet:
  # personality distribution (weights) — mirrors the offline simulator
  mix: { momentum: 22, contrarian: 16, news_reactive: 14, overconfident: 12, herd: 24, noise: 12 }
  aggressiveness: 0.05         # fraction of bankroll per conviction-unit
  max_trade_coins: 120         # hard cap per trade (keeps thin markets from snapping)
  min_trade_coins: 10
  trade_prob: 0.7              # chance a selected bot acts on a given tick
  reaction_delay: 1

pacing:
  cycle_interval_s: 2.0        # seconds between cycles (real-time pacing)
  # (bot, market) decisions per cycle. In PUBLIC mode each bot is rate-limited to
  # 10 trades / 10s by the server, so keep this near ~2× fleet_size; raise it for
  # large internal (Bearer-secret) fleets where there's no per-user limit.
  trades_per_cycle: 12
  comment_rate: 0.15           # fraction of successful trades that also comment
  signal_refresh_cycles: 5     # recompute each market's shared inference signal every N cycles

inference:                     # per-market title sentiment — shared, NOT per-bot
  sentiment_backend: local_heuristic
  event_backend: local_heuristic
  reasoning_backend: local_heuristic
  # For the real thing, point these at FinBERT/Qwen (see config.yaml):
  #   sentiment_backend: finbert_api
  #   reasoning_backend: qwen_api          # legacy custom server, or:
  #   reasoning_backend: qwen_openai       # hosted Qwen (OpenAI/chat, e.g. PodStack)
  # qwen_openai:
  #   type: qwen_openai
  #   url:     "${QWEN_OPENAI_URL:-https://cloud.podstack.ai/api/v1/podvirt/chat/completions}"
  #   api_key: "${QWEN_API_KEY:-}"
  #   model:   "${QWEN_MODEL:-qwen25-05b-instruct}"
  cache: { enabled: true, scope: tick }

comments:
  backend: template            # template (offline) | llm (Qwen one-liners)
  qwen_url: "${QWEN_URL:-}"     # set to use the LLM for comments (legacy or chat URL)
  qwen_api_key: "${QWEN_API_KEY:-}"   # set (with a chat URL) → OpenAI/chat protocol
  qwen_model: "${QWEN_MODEL:-}"       # model id for the chat protocol

news_feed:                     # REAL news → per-market signal pipeline
  enabled: true                # false = market titles only (previous behaviour)
  google_news:                 # PRIMARY: dynamic per-market query
    hl: en-IN                  # language (markets here are India-heavy)
    gl: IN                     # country
    ceid: "IN:en"
  fallback_feeds:              # STABILITY LAYER — live, reliable (Reuters RSS is defunct, so BBC)
    - https://feeds.bbci.co.uk/news/world/rss.xml
    - https://feeds.bbci.co.uk/news/business/rss.xml
    - https://feeds.bbci.co.uk/news/technology/rss.xml
  relevance:                   # RSS → embeddings cheap-filter → top-K → LLM refine → bots
    backend: embeddings        # embeddings (cheap filter) | keyword (pure-offline fallback)
    threshold: 0.34            # keyword-backend floor (token overlap), if backend=keyword
    embeddings:
      url: "${EMBED_URL:-}"    # remote SEMANTIC model (POST /embed → vectors); empty → local lexical hashing
      top_k: 6                 # keep the top-K most relevant articles
      min_cosine: 0.15         # drop candidates below this cosine similarity
      dim: 512                 # local-hashing vector size (ignored when url is set)
    refine:                    # stage 2: LLM refines ONLY the top-K (optional, off by default)
      enabled: false
      qwen_url: "${QWEN_URL:-}"          # legacy custom server, or a chat URL below
      api_key: "${QWEN_API_KEY:-}"       # set (with a chat URL) → OpenAI/chat protocol
      model: "${QWEN_MODEL:-}"           # model id for the chat protocol
      min_score: 0.5
  max_items: 5                 # headlines per market fed to the signal engine
  min_primary: 2               # fewer than this many Google hits → pull fallback feeds
  cache_ttl_s: 300             # re-fetch a market's news at most every 5 min
  max_fetch_per_cycle: 8       # HTTP fetch budget per cycle (keeps the loop snappy)
  timeout_s: 6

seed: 7
